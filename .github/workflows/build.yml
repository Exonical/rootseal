name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Test & Lint ──────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./internal/...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: golangci-lint
        run: golangci-lint run ./...

      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude-dir pkg/api ./...

  # ── 2. Build Binaries ───────────────────────────────────────────────────────
  build-binaries:
    name: Build Binaries (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p bin
          go build -ldflags "-s -w" \
            -o bin/rootseal-linux-${{ matrix.arch }} \
            ./cmd/rootseal
          go build -ldflags "-s -w" \
            -o bin/rootseal-controlplane-linux-${{ matrix.arch }} \
            ./cmd/controlplane

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-${{ matrix.arch }}
          path: bin/

  # ── 3. Build RPM ────────────────────────────────────────────────────────────
  build-rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    needs: test
    container:
      image: rockylinux:10

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y golang rpm-build rpmdevtools git make

      - name: Vendor Go modules
        run: go mod vendor

      - name: Build RPMs
        run: |
          rpmdev-setuptree
          tar --transform 's,^,rootseal-0.1.0/,' \
              --exclude='.git' \
              --exclude='bin' \
              -czf ~/rpmbuild/SOURCES/rootseal-0.1.0.tar.gz .
          cp packaging/rootseal.spec ~/rpmbuild/SPECS/rootseal.spec
          rpmbuild -ba ~/rpmbuild/SPECS/rootseal.spec

      - name: Collect RPMs
        run: |
          mkdir -p rpms
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} rpms/ \;
          ls -lh rpms/

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rpms
          path: rpms/

  # ── 4. FIPS Binaries (amd64 only, requires CGO + gcc) ──────────────────────
  build-fips-binaries:
    name: Build FIPS Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc
        run: sudo apt-get install -y gcc

      - name: Build FIPS binaries
        env:
          GOEXPERIMENT: boringcrypto
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p bin
          go build -ldflags "-s -w" \
            -o bin/rootseal-fips-linux-amd64 \
            ./cmd/rootseal
          go build -ldflags "-s -w" \
            -o bin/rootseal-controlplane-fips-linux-amd64 \
            ./cmd/controlplane

      - name: Verify BoringCrypto symbols
        run: |
          nm bin/rootseal-fips-linux-amd64 | grep -q "_Cfunc__goboringcrypto" && \
            echo "rootseal-fips: BoringCrypto OK" || \
            (echo "ERROR: BoringCrypto symbols missing" && exit 1)

      - name: Upload FIPS binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-fips-linux-amd64
          path: bin/

  # ── 5. FIPS RPM ─────────────────────────────────────────────────────────────
  build-fips-rpm:
    name: Build FIPS RPM
    runs-on: ubuntu-latest
    needs: test
    container:
      image: rockylinux:10

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y golang gcc rpm-build rpmdevtools git make

      - name: Vendor Go modules
        run: go mod vendor

      - name: Build FIPS RPMs
        run: |
          rpmdev-setuptree
          tar --transform 's,^,rootseal-0.1.0/,' \
              --exclude='.git' \
              --exclude='bin' \
              -czf ~/rpmbuild/SOURCES/rootseal-0.1.0.tar.gz .
          cp packaging/rootseal.spec ~/rpmbuild/SPECS/rootseal.spec
          rpmbuild -ba \
            --with fips_build \
            ~/rpmbuild/SPECS/rootseal.spec

      - name: Collect FIPS RPMs
        run: |
          mkdir -p rpms-fips
          find ~/rpmbuild/RPMS -name '*fips*.rpm' -exec cp {} rpms-fips/ \;
          ls -lh rpms-fips/

      - name: Upload FIPS RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rpms-fips
          path: rpms-fips/

  # ── 6. GitHub Release (tags only) ───────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-rpm, build-fips-binaries, build-fips-rpm]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download binaries (amd64)
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: release/

      - name: Download binaries (arm64)
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-arm64
          path: release/

      - name: Download RPMs
        uses: actions/download-artifact@v4
        with:
          name: rpms
          path: release/

      - name: Download FIPS binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-fips-linux-amd64
          path: release/

      - name: Download FIPS RPMs
        uses: actions/download-artifact@v4
        with:
          name: rpms-fips
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
